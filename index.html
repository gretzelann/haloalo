<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Zaina ❤️ My Love</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
}

body{

overflow:hidden;
height:100vh;
display:flex;
justify-content:center;
align-items:center;
font-family:'Segoe UI',sans-serif;

background:linear-gradient(-45deg,#ff4d6d,#ff758f,#ff9eb5,#ffd6e0);
background-size:400% 400%;
animation:bg 15s ease infinite;

}

@keyframes bg{

0%{background-position:0% 50%;}
50%{background-position:100% 50%;}
100%{background-position:0% 50%;}

}

#stars{

position:fixed;
width:100%;
height:100%;
overflow:hidden;
z-index:0;

}

.star{

position:absolute;
background:white;
border-radius:50%;
animation:twinkle 2s infinite alternate;

}

@keyframes twinkle{

from{
opacity:.2;
transform:scale(.5);
}

to{
opacity:1;
transform:scale(1.4);
}

}

.container{

position:relative;
z-index:5;
text-align:center;

}

button{

padding:18px 40px;
font-size:22px;
border:none;
border-radius:50px;
background:white;
color:#ff2d55;
cursor:pointer;

box-shadow:0 0 20px white;

transition:.4s;

}

button:hover{

transform:scale(1.08);

}

#bigHeart{

position:absolute;
left:50%;
top:50%;

width:260px;
height:260px;

background:#ff1744;

transform:translate(-50%,-50%) rotate(-45deg) scale(0);

transition:1.5s;

box-shadow:0 0 60px #ff1744;

pointer-events:none;

z-index:2;

}

#bigHeart:before,
#bigHeart:after{

content:"";

position:absolute;

width:260px;
height:260px;

background:#ff1744;

border-radius:50%;

}

#bigHeart:before{

top:-130px;

}

#bigHeart:after{

left:130px;

}

.show{

animation:heartbeat 1.4s infinite;

transform:translate(-50%,-50%) rotate(-45deg) scale(1)!important;

}

@keyframes heartbeat{

0%{
transform:translate(-50%,-50%) rotate(-45deg) scale(1);
}

25%{
transform:translate(-50%,-50%) rotate(-45deg) scale(1.08);
}

50%{
transform:translate(-50%,-50%) rotate(-45deg) scale(0.95);
}

75%{
transform:translate(-50%,-50%) rotate(-45deg) scale(1.1);
}

100%{
transform:translate(-50%,-50%) rotate(-45deg) scale(1);
}

}

#text{

position:absolute;

left:50%;
top:50%;

transform:translate(-50%,-50%);

font-size:42px;

font-weight:bold;

color:white;

text-shadow:0 0 15px white;

opacity:0;

transition:2s;

z-index:10;

pointer-events:none;

}

#text.show{

opacity:1;

}

.floating{

position:absolute;

font-size:25px;

pointer-events:none;

animation:float linear forwards;

}

@keyframes float{

0%{

transform:translateY(0);

opacity:0;

}

20%{

opacity:1;

}

100%{

transform:translateY(-120vh);

opacity:0;

}

}

.spark{

position:absolute;

width:8px;

height:8px;

background:white;

border-radius:50%;

pointer-events:none;

}

.petal{

position:absolute;

font-size:24px;

animation:petalFall linear forwards;

pointer-events:none;

}

@keyframes petalFall{

0%{

transform:translateY(-100px) rotate(0deg);

opacity:1;

}

100%{

transform:translateY(110vh) rotate(720deg);

opacity:0;

}

}

</style>

</head>

<body>

<div id="stars"></div>

<div id="bigHeart"></div>

<div id="text">
Zaina ❤️<br>My Love
</div>

<div class="container">

<button id="btn">

Click For A Surprise ❤️

</button>

</div>

<script>

/////////////////////////////////////////////////////
// STARS
/////////////////////////////////////////////////////

const stars=document.getElementById("stars");

for(let i=0;i<180;i++){

let s=document.createElement("div");

s.className="star";

let size=Math.random()*3+1;

s.style.width=size+"px";
s.style.height=size+"px";

s.style.left=Math.random()*100+"vw";
s.style.top=Math.random()*100+"vh";

s.style.animationDelay=Math.random()*3+"s";

stars.appendChild(s);

}

/////////////////////////////////////////////////////
// FLOATING HEARTS
/////////////////////////////////////////////////////

setInterval(()=>{

let h=document.createElement("div");

h.className="floating";

h.innerHTML="❤️";

h.style.left=Math.random()*100+"vw";

h.style.bottom="-40px";

h.style.fontSize=(20+Math.random()*25)+"px";

h.style.animationDuration=(4+Math.random()*5)+"s";

document.body.appendChild(h);

setTimeout(()=>{

h.remove();

},9000);

},250);

/////////////////////////////////////////////////////
// BUTTON
/////////////////////////////////////////////////////

document.getElementById("btn").addEventListener("click",surprise);

let played=false;

function surprise(){

if(played) return;

played=true;

document.getElementById("btn").style.display="none";

document.getElementById("bigHeart").classList.add("show");

setTimeout(()=>{

document.getElementById("text").classList.add("show");

},700);

explode();

sparkles();

petals();

}

/////////////////////////////////////////////////////
// HEART EXPLOSION
/////////////////////////////////////////////////////

function explode(){

for(let i=0;i<140;i++){

let h=document.createElement("div");

h.innerHTML="❤️";

h.style.position="absolute";

h.style.left="50%";

h.style.top="50%";

h.style.fontSize=(16+Math.random()*26)+"px";

document.body.appendChild(h);

let angle=Math.random()*Math.PI*2;

let distance=200+Math.random()*450;

let x=Math.cos(angle)*distance;

let y=Math.sin(angle)*distance;

h.animate([

{

transform:"translate(-50%,-50%) scale(.2)",

opacity:1

},

{

transform:`translate(${x}px,${y}px) scale(2)`,

opacity:0

}

],{

duration:2500,

easing:"ease-out"

});

setTimeout(()=>{

h.remove();

},2500);

}

}

/////////////////////////////////////////////////////
// SPARKLES
/////////////////////////////////////////////////////

function sparkles(){

for(let i=0;i<250;i++){

let s=document.createElement("div");

s.className="spark";

s.style.left="50%";

s.style.top="50%";

document.body.appendChild(s);

let angle=Math.random()*Math.PI*2;

let distance=Math.random()*500;

let x=Math.cos(angle)*distance;

let y=Math.sin(angle)*distance;

s.animate([

{

transform:"translate(0,0) scale(0)",

opacity:1

},

{

transform:`translate(${x}px,${y}px) scale(2)`,

opacity:0

}

],{

duration:2200

});

setTimeout(()=>{

s.remove();

},2200);

}

}

/////////////////////////////////////////////////////
// ROSE PETALS
/////////////////////////////////////////////////////

function petals(){

setInterval(()=>{

let p=document.createElement("div");

p.className="petal";

p.innerHTML="🌹";

p.style.left=Math.random()*100+"vw";

p.style.animationDuration=(6+Math.random()*5)+"s";

document.body.appendChild(p);

setTimeout(()=>{

p.remove();

},12000);

},300);

}

</script>

</body>
</html>
